<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Anti Bot Injector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f13;
    --panel: #14171d;
    --panel-2: #1a1e26;
    --raised: #1f242d;
    --border: #262c37;
    --border-soft: #1d222b;
    --text: #e5e9f0;
    --text-dim: #9aa3b2;
    --text-mute: #5b6572;
    --accent: oklch(0.78 0.12 210);
    --accent-dim: oklch(0.78 0.12 210 / 0.15);
    --accent-glow: oklch(0.78 0.12 210 / 0.35);
    --green: oklch(0.78 0.13 150);
    --amber: oklch(0.82 0.13 75);
    --red: oklch(0.70 0.18 25);
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #05070a;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  #root { width: 100%; max-width: 1024px; }

  /* window chrome */
  .window {
    width: 100%;
    background: var(--bg);
    border-radius: 10px;
    border: 1px solid #1a1f28;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.02) inset,
      0 40px 80px -20px rgba(0,0,0,0.6),
      0 20px 40px -15px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 640px;
  }
  .titlebar {
    height: 36px;
    background: #0a0c10;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 12px;
    user-select: none;
    flex-shrink: 0;
  }
  .titlebar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .titlebar-brand-mark {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: linear-gradient(135deg, var(--accent), oklch(0.55 0.14 225));
    position: relative;
  }
  .titlebar-brand-mark::after {
    content: '';
    position: absolute; inset: 3px;
    background: #0a0c10;
    border-radius: 1px;
  }
  .titlebar-brand strong { color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
  .titlebar-brand .sep { color: var(--text-mute); }
  .titlebar-spacer { flex: 1; }
  .win-btn {
    width: 28px; height: 22px;
    display: grid; place-items: center;
    border-radius: 4px;
    color: var(--text-mute);
    cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .win-btn:hover { background: #1a1f28; color: var(--text); }
  .win-btn.close:hover { background: var(--red); color: white; }
  .win-btn svg { display: block; }

  /* body layout */
  .body {
    flex: 1;
    display: grid;
    grid-template-columns: 180px 1fr;
    min-height: 0;
  }
  .sidebar {
    background: #0a0c10;
    border-right: 1px solid var(--border-soft);
    padding: 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .side-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-mute);
    padding: 10px 10px 6px;
    font-weight: 600;
  }
  .nav {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: 5px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 500;
    transition: background 120ms, color 120ms;
  }
  .nav:hover { background: #12161d; color: var(--text); }
  .nav.active { background: var(--raised); color: var(--text); }
  .nav.active .nav-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .nav-icon { width: 14px; height: 14px; opacity: 0.8; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-left: auto; }
  .sidebar-foot {
    margin-top: auto;
    padding: 10px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-mute);
    line-height: 1.6;
  }
  .sidebar-foot .row { display: flex; justify-content: space-between; }
  .sidebar-foot .row span:last-child { color: var(--text-dim); }

  .main {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  /* page header */
  .page-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }
  .page-head h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.015em;
  }
  .page-head p {
    margin: 3px 0 0;
    font-size: 12px;
    color: var(--text-dim);
  }
  .proc-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11.5px;
    font-family: var(--font-mono);
    color: var(--text-dim);
  }
  .proc-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-mute); }
  .proc-pill.running .dot { background: var(--green); box-shadow: 0 0 6px oklch(0.78 0.13 150 / 0.6); }
  .proc-pill.running { color: var(--text); }

  /* content scroller */
  .content {
    padding: 20px 24px 0;
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-content: start;
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #1e232d; border-radius: 4px; }

  .col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  /* cards */
  .card {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    overflow: hidden;
  }
  .card-hd {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .card-hd h3 {
    margin: 0;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .card-bd { padding: 14px; }

  /* status card — hero */
  .status-card {
    position: relative;
    padding: 20px 22px;
    background: linear-gradient(180deg, #161a22 0%, #13161d 100%);
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    overflow: hidden;
  }
  .status-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 85% 20%, var(--accent-dim) 0%, transparent 40%);
    opacity: 0.6;
    pointer-events: none;
  }
  .status-card > * { position: relative; }
  .status-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .status-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-mute);
    font-weight: 600;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 9px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
  }
  .status-value {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .status-indicator {
    width: 44px; height: 44px;
    border-radius: 50%;
    position: relative;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .status-indicator .ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--border);
  }
  .status-indicator .ring-active {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    border-top-color: transparent;
    animation: spin 1.1s linear infinite;
    opacity: 0;
  }
  .status-indicator .core {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: background 240ms, box-shadow 240ms;
  }
  .status-idle .core { background: var(--text-mute); }
  .status-scanning .ring-active { opacity: 1; }
  .status-scanning .core { background: var(--amber); box-shadow: 0 0 10px oklch(0.82 0.13 75 / 0.6); }
  .status-injecting .ring-active { opacity: 1; border-top-color: transparent; border-color: var(--accent); }
  .status-injecting .core { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); animation: pulse 0.8s ease-in-out infinite; }
  .status-injected .core { background: var(--green); box-shadow: 0 0 14px oklch(0.78 0.13 150 / 0.7); animation: pulse 2.2s ease-in-out infinite; }
  .status-error .core { background: var(--red); box-shadow: 0 0 10px oklch(0.70 0.18 25 / 0.5); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  .status-text h2 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .status-text p {
    margin: 2px 0 0;
    font-size: 12.5px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  .status-bar {
    margin-top: 18px;
    height: 3px;
    background: #0c0f14;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .status-bar-fill {
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 200ms linear;
  }
  .status-bar-sweep {
    position: absolute;
    top: 0; bottom: 0; width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: sweep 1.4s ease-in-out infinite;
    opacity: 0;
  }
  .status-scanning .status-bar-sweep { opacity: 1; }
  @keyframes sweep { 0% { left: -40%; } 100% { left: 100%; } }

  /* primary button */
  .inject-btn {
    margin-top: 18px;
    width: 100%;
    padding: 13px 18px;
    background: var(--accent);
    color: #07141a;
    border: none;
    border-radius: 7px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 80ms, box-shadow 200ms, background 200ms, opacity 200ms;
    box-shadow: 0 0 0 1px oklch(0.78 0.12 210 / 0.3), 0 8px 20px -8px var(--accent-glow);
  }
  .inject-btn:hover:not(:disabled) {
    background: oklch(0.82 0.12 210);
    box-shadow: 0 0 0 1px oklch(0.82 0.12 210 / 0.4), 0 12px 28px -8px var(--accent-glow);
  }
  .inject-btn:active:not(:disabled) { transform: translateY(1px); }
  .inject-btn:disabled {
    background: var(--raised);
    color: var(--text-mute);
    cursor: not-allowed;
    box-shadow: 0 0 0 1px var(--border);
  }
  .inject-btn.danger {
    background: transparent;
    color: var(--red);
    box-shadow: 0 0 0 1px oklch(0.70 0.18 25 / 0.4);
  }
  .inject-btn.danger:hover:not(:disabled) {
    background: oklch(0.70 0.18 25 / 0.1);
    box-shadow: 0 0 0 1px var(--red);
  }
  .inject-btn .kbd {
    font-family: var(--font-mono);
    font-size: 10.5px;
    opacity: 0.65;
    padding: 2px 6px;
    background: rgba(0,0,0,0.15);
    border-radius: 3px;
    margin-left: auto;
  }

  .btn-secondary {
    padding: 9px 14px;
    background: var(--raised);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 120ms, border-color 120ms;
  }
  .btn-secondary:hover { background: #242a34; border-color: #2e3542; }
  .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost {
    padding: 6px 10px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid transparent;
    border-radius: 5px;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background 120ms, color 120ms;
  }
  .btn-ghost:hover { background: var(--raised); color: var(--text); }

  /* delay control */
  .field {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-top: 1px solid var(--border-soft);
  }
  .field:first-child { border-top: none; padding-top: 0; }
  .field:last-child { padding-bottom: 0; }
  .field-label {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 500;
  }
  .field-sub {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 2px;
  }
  .slider-row {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }
  .slider {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 4px;
    background: #0c0f14;
    border-radius: 2px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 4px var(--bg), 0 0 10px var(--accent-glow);
  }
  .slider::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--accent); border: none; border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 4px var(--bg);
  }
  .slider-value {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    min-width: 58px;
    text-align: right;
    font-weight: 500;
  }

  /* toggle */
  .toggle {
    width: 34px; height: 20px;
    background: #0c0f14;
    border: 1px solid var(--border);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    transition: background 160ms, border-color 160ms;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: transform 180ms cubic-bezier(.4,1.4,.6,1), background 160ms;
  }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle.on::after { transform: translateX(14px); background: var(--accent); }

  /* update card */
  .update-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    font-family: var(--font-mono);
    font-size: 11.5px;
  }
  .update-row .k { color: var(--text-mute); min-width: 76px; }
  .update-row .v { color: var(--text); }
  .update-row .v.ok { color: var(--green); }
  .update-row .v.new { color: var(--accent); }
  .update-progress {
    margin-top: 10px;
    height: 2px;
    background: #0c0f14;
    border-radius: 1px;
    overflow: hidden;
  }
  .update-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 200ms;
  }

  /* log */
  .log {
    background: #07090c;
    border-top: 1px solid var(--border-soft);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px 14px;
    height: 140px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .log::-webkit-scrollbar { width: 6px; }
  .log::-webkit-scrollbar-thumb { background: #1a1f28; border-radius: 3px; }
  .log-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    background: #0a0c10;
    border-top: 1px solid var(--border-soft);
    border-bottom: 1px solid var(--border-soft);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-mute);
    font-weight: 600;
    flex-shrink: 0;
  }
  .log-line {
    display: flex;
    gap: 10px;
    padding: 2px 0;
    line-height: 1.55;
    animation: logIn 180ms ease-out;
  }
  @keyframes logIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: none; }
  }
  .log-line .t { color: var(--text-mute); flex-shrink: 0; }
  .log-line .tag { flex-shrink: 0; min-width: 42px; font-weight: 600; }
  .log-line.info .tag { color: var(--text-dim); }
  .log-line.ok .tag { color: var(--green); }
  .log-line.warn .tag { color: var(--amber); }
  .log-line.err .tag { color: var(--red); }
  .log-line.acc .tag { color: var(--accent); }
  .log-line .msg { color: var(--text-dim); word-break: break-all; }

  /* tiny bits */
  .hint { font-size: 11px; color: var(--text-mute); font-family: var(--font-mono); }
  .row { display: flex; align-items: center; gap: 8px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .tag-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 2px 6px;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
  }
  .tag-pill.accent { color: var(--accent); border-color: oklch(0.78 0.12 210 / 0.3); background: var(--accent-dim); }
  .divider { height: 1px; background: var(--border-soft); margin: 4px 0; }

  /* keyboard hint */
  .kbd-inline {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 1px 5px;
    background: #0c0f14;
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 3px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ----- tiny icons -----
const Icon = ({ d, size = 14, stroke = 1.6 }) => (
  <svg className="nav-icon" width={size} height={size} viewBox="0 0 24 24" fill="none"
       stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
    {typeof d === 'string' ? <path d={d} /> : d}
  </svg>
);
const I = {
  home: "M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5Z",
  inject: "M14 4 20 10 M10 8l6 6 M4 20l6-6 M4 14v6h6",
  settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z",
  log: "M8 6h13 M8 12h13 M8 18h13 M3 6h.01 M3 12h.01 M3 18h.01",
  info: "M12 16v-4 M12 8h.01 M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z",
  play: "m5 3 14 9-14 9V3Z",
  download: "M12 3v12 m-5-5 5 5 5-5 M5 21h14",
  refresh: "M21 12a9 9 0 1 1-3-6.7L21 8 M21 3v5h-5",
  power: "M12 2v10 M18.36 6.64a9 9 0 1 1-12.73 0",
  stop: "M6 6h12v12H6z",
  check: "m5 12 5 5L20 7",
  zap: "M13 2 3 14h8l-1 8 10-12h-8l1-8z",
};

// ----- state machine -----
const STATES = {
  IDLE: 'idle',
  SCANNING: 'scanning',
  WAITING: 'waiting',
  INJECTING: 'injecting',
  INJECTED: 'injected',
  ERROR: 'error',
  UPDATING: 'updating',
};

const STATUS_COPY = {
  idle:      { label: 'Idle',        sub: 'Awaiting target process' },
  scanning:  { label: 'Scanning',    sub: 'Searching for RocketLeague.exe' },
  waiting:   { label: 'Queued',      sub: 'Countdown before injection' },
  injecting: { label: 'Injecting',   sub: 'Writing module into process memory' },
  injected:  { label: 'Injected',    sub: 'Module loaded · hooks active' },
  error:     { label: 'Error',       sub: 'Injection failed' },
  updating:  { label: 'Updating',    sub: 'Fetching latest build' },
};

// ----- log helpers -----
const ts = () => {
  const d = new Date();
  return d.toTimeString().slice(0,8);
};

function App() {
  const [state, setState] = useState(STATES.IDLE);
  const [procRunning, setProcRunning] = useState(false);
  const [autoInject, setAutoInject] = useState(true);
  const [autoUpdate, setAutoUpdate] = useState(true);
  const [delay, setDelay] = useState(2000); // ms
  const [waitRemaining, setWaitRemaining] = useState(0);
  const [injectProgress, setInjectProgress] = useState(0);
  const [updateProgress, setUpdateProgress] = useState(0);

  const [dllVersion, setDllVersion] = useState('v1.4.2');
  const [latestVersion, setLatestVersion] = useState('v1.4.3');
  const [updateAvailable, setUpdateAvailable] = useState(true);
  const [dllHash] = useState('a6f3e91c');

  const [logs, setLogs] = useState([
    { t: ts(), tag: 'info', msg: 'Anti Bot Injector initialized' },
    { t: ts(), tag: 'acc',  msg: 'Registered module: antibot.dll' },
    { t: ts(), tag: 'info', msg: 'Scanning for target process…' },
  ]);
  const logRef = useRef(null);
  const timersRef = useRef([]);

  const push = useCallback((tag, msg) => {
    setLogs(l => [...l.slice(-80), { t: ts(), tag, msg }]);
  }, []);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  const clearTimers = () => {
    timersRef.current.forEach(id => clearTimeout(id));
    timersRef.current = [];
  };
  const after = (ms, fn) => {
    const id = setTimeout(fn, ms);
    timersRef.current.push(id);
    return id;
  };

  // simulate process detection after ~2.5s
  useEffect(() => {
    const id = setTimeout(() => {
      setProcRunning(true);
      push('ok', 'Process detected: RocketLeague.exe [PID 11472]');
    }, 2800);
    return () => clearTimeout(id);
  }, [push]);

  // auto-inject trigger once process is running
  useEffect(() => {
    if (procRunning && autoInject && state === STATES.IDLE) {
      after(500, () => beginInject(true));
    }
    // eslint-disable-next-line
  }, [procRunning]);

  // countdown tick
  useEffect(() => {
    if (state !== STATES.WAITING) return;
    if (waitRemaining <= 0) {
      runInjection();
      return;
    }
    const id = setTimeout(() => setWaitRemaining(w => Math.max(0, w - 100)), 100);
    return () => clearTimeout(id);
  }, [state, waitRemaining]);

  // inject progress tick
  useEffect(() => {
    if (state !== STATES.INJECTING) return;
    if (injectProgress >= 100) {
      after(200, () => {
        setState(STATES.INJECTED);
        push('ok', 'Module loaded at 0x7FF62A000000');
        push('acc', 'Hooks installed · DirectX 11 pipeline attached');
        push('ok', 'Injection complete in 1.82s');
      });
      return;
    }
    const id = setTimeout(() => setInjectProgress(p => Math.min(100, p + 4 + Math.random()*3)), 40);
    return () => clearTimeout(id);
  }, [state, injectProgress, push]);

  const beginInject = (isAuto = false) => {
    if (!procRunning) {
      push('warn', 'No target process. Launch Rocket League first.');
      return;
    }
    clearTimers();
    setState(STATES.SCANNING);
    push(isAuto ? 'acc' : 'info', isAuto ? 'Auto-inject triggered' : 'Manual inject requested');
    push('info', 'Verifying module integrity…');

    after(700, () => {
      push('ok', `SHA256 match · antibot.dll (${dllHash})`);
      if (delay > 0) {
        setWaitRemaining(delay);
        setState(STATES.WAITING);
        push('info', `Delay: ${(delay/1000).toFixed(1)}s before inject`);
      } else {
        runInjection();
      }
    });
  };

  const runInjection = () => {
    setInjectProgress(0);
    setState(STATES.INJECTING);
    push('acc', 'Opening process handle (PROCESS_ALL_ACCESS)');
    after(140, () => push('info', 'Allocating remote memory · 48 KB'));
    after(400, () => push('info', 'Writing payload · LoadLibraryW'));
    after(760, () => push('info', 'CreateRemoteThread → 0x000023F4'));
  };

  const eject = () => {
    clearTimers();
    push('warn', 'Unloading module…');
    after(300, () => {
      push('ok', 'Module unloaded cleanly');
      setState(STATES.IDLE);
      setInjectProgress(0);
    });
  };

  const launchGame = () => {
    push('info', 'Launching RocketLeague.exe via Steam…');
    after(600, () => push('ok', 'Steam handoff complete'));
  };

  const runUpdate = () => {
    if (!updateAvailable) return;
    clearTimers();
    setUpdateProgress(0);
    setState(STATES.UPDATING);
    push('acc', `Update available: ${latestVersion}`);
    push('info', `Fetching from repo/antibot/releases/${latestVersion}`);
    const tick = () => {
      setUpdateProgress(p => {
        const next = Math.min(100, p + 5 + Math.random()*5);
        if (next >= 100) {
          after(150, () => {
            push('ok', `antibot.dll updated → ${latestVersion}`);
            push('info', `Stored at %APPDATA%\\AntiBot\\modules\\antibot-${latestVersion}.dll`);
            setDllVersion(latestVersion);
            setUpdateAvailable(false);
            setState(STATES.IDLE);
          });
          return 100;
        }
        after(120, tick);
        return next;
      });
    };
    after(300, tick);
  };

  const canInject = procRunning && (state === STATES.IDLE || state === STATES.ERROR);
  const isBusy = [STATES.SCANNING, STATES.WAITING, STATES.INJECTING, STATES.UPDATING].includes(state);
  const isInjected = state === STATES.INJECTED;

  const status = STATUS_COPY[state];

  // spacebar = inject
  useEffect(() => {
    const h = (e) => {
      if (e.code === 'Space' && !e.repeat && e.target.tagName !== 'INPUT') {
        e.preventDefault();
        if (canInject) beginInject(false);
        else if (isInjected) eject();
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  });

  return (
    <div className="window">
      <Titlebar />
      <div className="body">
        <Sidebar autoInject={autoInject} procRunning={procRunning} dllVersion={dllVersion} />
        <div className="main">
          <header className="page-head">
            <div>
              <h1>Injector</h1>
              <p>Attach the Anti Bot module to Rocket League at runtime.</p>
            </div>
            <div className={`proc-pill ${procRunning ? 'running' : ''}`}>
              <span className="dot" />
              <span>{procRunning ? 'RocketLeague.exe · PID 11472' : 'Process not found'}</span>
            </div>
          </header>

          <div className="content">
            <div className="col">
              <StatusCard
                state={state}
                status={status}
                waitRemaining={waitRemaining}
                injectProgress={injectProgress}
                canInject={canInject}
                isInjected={isInjected}
                isBusy={isBusy}
                onInject={() => beginInject(false)}
                onEject={eject}
              />

              <div className="card">
                <div className="card-hd">
                  <h3>Timing</h3>
                  <span className="hint">Applied before LoadLibrary</span>
                </div>
                <div className="card-bd">
                  <div className="field">
                    <div>
                      <div className="field-label">Inject delay</div>
                      <div className="field-sub">Wait after process detection before attaching</div>
                    </div>
                    <div className="slider-value">{(delay/1000).toFixed(1)}s</div>
                    <div className="slider-row">
                      <input
                        className="slider"
                        type="range" min="0" max="10000" step="100"
                        value={delay}
                        onChange={e => setDelay(Number(e.target.value))}
                        style={{
                          background: `linear-gradient(to right, var(--accent) 0%, var(--accent) ${(delay/10000)*100}%, #0c0f14 ${(delay/10000)*100}%, #0c0f14 100%)`
                        }}
                      />
                    </div>
                  </div>
                  <div className="field">
                    <div>
                      <div className="field-label">Auto-inject</div>
                      <div className="field-sub">Attach as soon as the game process appears</div>
                    </div>
                    <div className={`toggle ${autoInject ? 'on' : ''}`} onClick={() => setAutoInject(a => !a)} />
                  </div>
                  <div className="field">
                    <div>
                      <div className="field-label">Auto-update module</div>
                      <div className="field-sub">Download & cache latest DLL before each inject</div>
                    </div>
                    <div className={`toggle ${autoUpdate ? 'on' : ''}`} onClick={() => setAutoUpdate(a => !a)} />
                  </div>
                </div>
              </div>

            </div>

            <div className="col">
              <UpdateCard
                current={dllVersion}
                latest={latestVersion}
                available={updateAvailable}
                state={state}
                progress={updateProgress}
                hash={dllHash}
                onUpdate={runUpdate}
              />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ----- subcomponents -----
function Titlebar() {
  return (
    <div className="titlebar">
      <div className="titlebar-brand">
        <div className="titlebar-brand-mark" />
        <strong>Anti Bot Injector</strong>
        <span className="sep">—</span>
        <span>v1.0.0</span>
      </div>
      <div className="titlebar-spacer" />
      <div className="win-btn" title="Minimize">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 5h8" stroke="currentColor" strokeWidth="1.2" /></svg>
      </div>
      <div className="win-btn" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor" strokeWidth="1.2" /></svg>
      </div>
      <div className="win-btn close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="m1 1 8 8 M9 1l-8 8" stroke="currentColor" strokeWidth="1.2" /></svg>
      </div>
    </div>
  );
}

function Sidebar({ autoInject, procRunning, dllVersion }) {
  return (
    <aside className="sidebar">
      <div className="side-label">Workspace</div>
      <div className="nav active"><Icon d={I.inject} /> Injector <span className="nav-dot" /></div>
      <div className="nav"><Icon d={I.settings} /> Settings</div>
      <div className="nav"><Icon d={I.info} /> About</div>

    </aside>
  );
}

function StatusCard({ state, status, waitRemaining, injectProgress, canInject, isInjected, isBusy, onInject, onEject }) {
  const cls = `status-card status-${state}`;
  let displaySub = status.sub;
  if (state === STATES.WAITING) displaySub = `T-${(waitRemaining/1000).toFixed(1)}s · delay active`;
  if (state === STATES.INJECTING) displaySub = `${injectProgress.toFixed(0)}% · CreateRemoteThread → LoadLibraryW`;

  const btn = isInjected
    ? <button className="inject-btn danger" onClick={onEject}>
        <Icon d={I.stop} size={13} /> Eject Module <span className="kbd">SPACE</span>
      </button>
    : <button className="inject-btn" disabled={!canInject} onClick={onInject}>
        <Icon d={I.zap} size={14} />
        {isBusy ? status.label + '…' : 'Inject Module'}
        <span className="kbd">SPACE</span>
      </button>;

  return (
    <div className={cls}>
      <div className="status-top">
        <div className="status-label">Injection Status</div>
        <span className="status-badge">
          <span>●</span> {state.toUpperCase()}
        </span>
      </div>
      <div className="status-value">
        <div className="status-indicator">
          <div className="ring" />
          <div className="ring-active" />
          <div className="core" />
        </div>
        <div className="status-text">
          <h2>{status.label}</h2>
          <p>{displaySub}</p>
        </div>
      </div>
      <div className="status-bar">
        <div className="status-bar-sweep" />
        <div
          className="status-bar-fill"
          style={{
            transform: `scaleX(${
              state === STATES.INJECTING ? injectProgress/100 :
              state === STATES.INJECTED ? 1 : 0
            })`
          }}
        />
      </div>
      {btn}
    </div>
  );
}

function UpdateCard({ current, latest, available, state, progress, hash, onUpdate }) {
  const isUpdating = state === STATES.UPDATING;
  return (
    <div className="card">
      <div className="card-hd">
        <h3>Module</h3>
        {available && !isUpdating && <span className="tag-pill accent">UPDATE</span>}
        {!available && !isUpdating && <span className="tag-pill">LATEST</span>}
      </div>
      <div className="card-bd">
        <div className="update-row">
          <span className="k">name</span>
          <span className="v">antibot.dll</span>
        </div>
        <div className="update-row">
          <span className="k">installed</span>
          <span className="v">{current}</span>
        </div>
        <div className="update-row">
          <span className="k">latest</span>
          <span className={`v ${available ? 'new' : 'ok'}`}>{latest}</span>
        </div>
        <div className="update-row">
          <span className="k">sha256</span>
          <span className="v" style={{fontSize: 10.5}}>{hash}···c1d8</span>
        </div>

        {isUpdating && (
          <>
            <div className="update-progress">
              <div className="update-progress-fill" style={{width: `${progress}%`}} />
            </div>
            <div className="hint" style={{marginTop:6}}>Downloading · {progress.toFixed(0)}%</div>
          </>
        )}

        <button
          className="btn-secondary"
          style={{marginTop: 12, width: '100%', justifyContent: 'center'}}
          disabled={!available || isUpdating}
          onClick={onUpdate}
        >
          <Icon d={available ? I.download : I.check} size={13} />
          {isUpdating ? 'Updating…' : available ? `Update to ${latest}` : 'Up to date'}
        </button>
      </div>
    </div>
  );
}

function TargetCard({ procRunning, onLaunch }) {
  return (
    <div className="card">
      <div className="card-hd">
        <h3>Target</h3>
        <span className="hint">Steam</span>
      </div>
      <div className="card-bd">
        <div className="update-row">
          <span className="k">process</span>
          <span className="v">RocketLeague.exe</span>
        </div>
        <div className="update-row">
          <span className="k">arch</span>
          <span className="v">x64</span>
        </div>
        <div className="update-row">
          <span className="k">status</span>
          <span className={`v ${procRunning ? 'ok' : ''}`}>
            {procRunning ? 'running · pid 11472' : 'not running'}
          </span>
        </div>
        <button
          className="btn-secondary"
          style={{marginTop: 12, width: '100%', justifyContent: 'center'}}
          disabled={procRunning}
          onClick={onLaunch}
        >
          <Icon d={I.play} size={12} />
          {procRunning ? 'Already running' : 'Launch game'}
        </button>
      </div>
    </div>
  );
}

function InfoCard() {
  return (
    <div className="card">
      <div className="card-hd"><h3>Shortcuts</h3></div>
      <div className="card-bd" style={{display:'flex', flexDirection:'column', gap:8}}>
        <div className="row" style={{justifyContent:'space-between', fontSize:11.5}}>
          <span style={{color:'var(--text-dim)'}}>Inject / Eject</span>
          <span className="kbd-inline">Space</span>
        </div>
        <div className="row" style={{justifyContent:'space-between', fontSize:11.5}}>
          <span style={{color:'var(--text-dim)'}}>Reload modules</span>
          <span className="kbd-inline">⌃R</span>
        </div>
        <div className="row" style={{justifyContent:'space-between', fontSize:11.5}}>
          <span style={{color:'var(--text-dim)'}}>Open log file</span>
          <span className="kbd-inline">⌃L</span>
        </div>
      </div>
    </div>
  );
}

function LogPanel({ logs, logRef }) {
  return (
    <div className="card" style={{padding:0, overflow:'hidden'}}>
      <div className="log-head">
        <span>Console</span>
        <span style={{color: 'var(--text-mute)'}}>{logs.length} lines</span>
      </div>
      <div className="log" ref={logRef}>
        {logs.map((l, i) => (
          <div key={i} className={`log-line ${l.tag}`}>
            <span className="t">{l.t}</span>
            <span className="tag">
              {l.tag === 'ok'   ? '[OK]'   :
               l.tag === 'warn' ? '[WRN]'  :
               l.tag === 'err'  ? '[ERR]'  :
               l.tag === 'acc'  ? '[SYS]'  : '[INF]'}
            </span>
            <span className="msg">{l.msg}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
