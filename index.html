<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Anti Bot Injector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f13;
    --panel: #14171d;
    --panel-2: #1a1e26;
    --raised: #1f242d;
    --border: #262c37;
    --border-soft: #1d222b;
    --text: #e5e9f0;
    --text-dim: #9aa3b2;
    --text-mute: #5b6572;
    --accent: oklch(0.78 0.12 210);
    --accent-dim: oklch(0.78 0.12 210 / 0.15);
    --accent-glow: oklch(0.78 0.12 210 / 0.35);
    --green: oklch(0.78 0.13 150);
    --amber: oklch(0.82 0.13 75);
    --red: oklch(0.70 0.18 25);
    --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #05070a;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    height: 100vh;
    overflow: hidden;
  }
  body { display: flex; }
  #root { width: 100%; height: 100%; }

  .window {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: 1px solid #1a1f28;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .titlebar {
    height: 40px;
    background: #0a0c10;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    padding: 0 0 0 16px;
    gap: 14px;
    user-select: none;
    flex-shrink: 0;
    -webkit-app-region: drag;
  }
  .titlebar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .titlebar-brand-mark {
    width: 18px; height: 18px;
    border-radius: 4px;
    object-fit: contain;
    display: block;
  }
  .titlebar-brand strong { color: var(--text); font-weight: 600; letter-spacing: -0.01em; }
  .titlebar-spacer { flex: 1; }
  .win-controls { display: flex; -webkit-app-region: no-drag; }
  .win-btn {
    width: 46px; height: 40px;
    display: grid; place-items: center;
    color: var(--text-mute);
    cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .win-btn:hover { background: #1a1f28; color: var(--text); }
  .win-btn.close:hover { background: var(--red); color: white; }
  .win-btn svg { display: block; }

  .body {
    flex: 1;
    display: grid;
    grid-template-columns: 180px 1fr;
    min-height: 0;
  }
  .sidebar {
    background: #0a0c10;
    border-right: 1px solid var(--border-soft);
    padding: 28px 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .side-label {
    font-size: 11px;
    letter-spacing: 0;
    color: var(--text-mute);
    padding: 6px 12px 12px;
    font-weight: 500;
  }
  .nav {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 7px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 120ms, color 120ms;
  }
  .nav:hover { background: #12161d; color: var(--text); }
  .nav.active { background: var(--raised); color: var(--text); }
  .nav.active .nav-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
  .nav-icon { width: 14px; height: 14px; opacity: 0.8; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-left: auto; }

  .main {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }

  .page-head {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-shrink: 0;
  }
  .page-head h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.025em;
  }
  .page-head p {
    margin: 8px 0 0;
    font-size: 13.5px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .proc-pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 7px 14px 7px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    font-family: var(--font-ui);
    color: var(--text-dim);
    font-weight: 500;
  }
  .proc-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-mute); }
  .proc-pill.running .dot { background: var(--green); box-shadow: 0 0 6px oklch(0.78 0.13 150 / 0.6); }
  .proc-pill.running { color: var(--text); }

  .content {
    padding: 40px 40px 48px;
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
    align-items: start;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }
  .content .col > .card,
  .content .col > .status-card { flex: 1; display: flex; flex-direction: column; }
  .content .col > .card > .card-bd { flex: 1; display: flex; flex-direction: column; }
  .content.single { grid-template-columns: 1fr; max-width: 720px; }
  .about-card {
    padding: 56px 40px 48px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .about-logo { width: 64px; height: 64px; object-fit: contain; margin-bottom: 18px; }
  .about-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .about-version {
    font-family: var(--font-ui);
    font-size: 13px;
    color: var(--text-mute);
    margin-bottom: 28px;
  }
  .about-credits { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
  .about-credits a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    border-bottom: 1px solid transparent;
    transition: border-color 120ms;
  }
  .about-credits a:hover { border-color: var(--accent); }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: #1e232d; border-radius: 4px; }

  .col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-hd {
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .card-hd h3 {
    margin: 0;
    font-size: 13.5px;
    letter-spacing: -0.005em;
    color: var(--text);
    font-weight: 600;
  }
  .card-bd { padding: 8px 24px 24px; }

  .status-card {
    position: relative;
    padding: 32px 32px 28px;
    background: linear-gradient(180deg, #161a22 0%, #13161d 100%);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    overflow: hidden;
  }
  .status-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 85% 20%, var(--accent-dim) 0%, transparent 40%);
    opacity: 0.6;
    pointer-events: none;
  }
  .status-card > * { position: relative; }
  .status-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .status-label {
    font-size: 11px;
    letter-spacing: 0.02em;
    color: var(--text-mute);
    font-weight: 500;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 14px 5px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--font-ui);
    font-size: 11.5px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .status-badge .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: background 240ms, box-shadow 240ms;
  }
  .status-scanning .status-badge .status-dot { background: var(--amber); box-shadow: 0 0 6px oklch(0.82 0.13 75 / 0.6); }
  .status-waiting  .status-badge .status-dot { background: var(--amber); box-shadow: 0 0 6px oklch(0.82 0.13 75 / 0.5); }
  .status-injecting .status-badge .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .status-injected .status-badge .status-dot { background: var(--green); box-shadow: 0 0 6px oklch(0.78 0.13 150 / 0.7); }
  .status-error    .status-badge .status-dot { background: var(--red);   box-shadow: 0 0 6px oklch(0.70 0.18 25 / 0.5); }
  .status-updating .status-badge .status-dot { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
  .status-value { display: flex; align-items: center; gap: 18px; }
  .status-indicator {
    width: 52px; height: 52px;
    border-radius: 50%;
    position: relative;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .status-indicator .ring { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--border); }
  .status-indicator .ring-active {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    border-top-color: transparent;
    animation: spin 1.1s linear infinite;
    opacity: 0;
  }
  .status-indicator .core {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: background 240ms, box-shadow 240ms;
  }
  .status-idle .core { background: var(--text-mute); }
  .status-scanning .ring-active { opacity: 1; }
  .status-scanning .core { background: var(--amber); box-shadow: 0 0 10px oklch(0.82 0.13 75 / 0.6); }
  .status-injecting .ring-active { opacity: 1; border-color: var(--accent); border-top-color: transparent; }
  .status-injecting .core { background: var(--accent); box-shadow: 0 0 12px var(--accent-glow); animation: pulse 0.8s ease-in-out infinite; }
  .status-injected .core { background: var(--green); box-shadow: 0 0 14px oklch(0.78 0.13 150 / 0.7); animation: pulse 2.2s ease-in-out infinite; }
  .status-error .core { background: var(--red); box-shadow: 0 0 10px oklch(0.70 0.18 25 / 0.5); }
  .status-waiting .ring-active { opacity: 1; border-color: var(--amber); border-top-color: transparent; }
  .status-waiting .core { background: var(--amber); box-shadow: 0 0 10px oklch(0.82 0.13 75 / 0.4); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  .status-text h2 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.028em;
  }
  .status-text p {
    margin: 6px 0 0;
    font-size: 14px;
    color: var(--text-dim);
    font-family: var(--font-ui);
    line-height: 1.45;
  }

  .status-bar {
    margin-top: 28px;
    height: 3px;
    background: #0c0f14;
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .status-bar-fill {
    position: absolute; inset: 0;
    background: var(--accent);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 200ms linear;
  }
  .status-bar-sweep {
    position: absolute; top: 0; bottom: 0; width: 40%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: sweep 1.4s ease-in-out infinite;
    opacity: 0;
  }
  .status-scanning .status-bar-sweep, .status-waiting .status-bar-sweep { opacity: 1; }
  @keyframes sweep { 0% { left: -40%; } 100% { left: 100%; } }

  .inject-btn {
    margin-top: 28px;
    width: 100%;
    padding: 15px 20px;
    background: var(--accent);
    color: #07141a;
    border: none;
    border-radius: 10px;
    font-family: var(--font-ui);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 80ms, box-shadow 200ms, background 200ms, opacity 200ms;
    box-shadow: 0 0 0 1px oklch(0.78 0.12 210 / 0.3), 0 10px 24px -10px var(--accent-glow);
  }
  .inject-btn:hover:not(:disabled) {
    background: oklch(0.82 0.12 210);
    box-shadow: 0 0 0 1px oklch(0.82 0.12 210 / 0.4), 0 12px 28px -8px var(--accent-glow);
  }
  .inject-btn:active:not(:disabled) { transform: translateY(1px); }
  .inject-btn:disabled {
    background: var(--raised);
    color: var(--text-mute);
    cursor: not-allowed;
    box-shadow: 0 0 0 1px var(--border);
  }
  .inject-btn.ghost {
    background: transparent;
    color: var(--text-dim);
    box-shadow: 0 0 0 1px var(--border);
  }
  .inject-btn.ghost:hover:not(:disabled) {
    background: var(--raised);
    color: var(--text);
    box-shadow: 0 0 0 1px #333a48;
  }

  .btn-secondary {
    padding: 9px 14px;
    background: var(--raised);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    transition: background 120ms, border-color 120ms;
  }
  .btn-secondary:hover:not(:disabled) { background: #242a34; border-color: #2e3542; }
  .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

  .gate-backdrop {
    position: absolute;
    inset: 40px 0 0 0;
    background: rgba(5, 7, 10, 0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 50;
    display: grid;
    place-items: center;
    padding: 24px;
    overflow-y: auto;
  }
  .gate-card {
    width: 100%;
    max-width: 440px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 40px 36px;
    box-shadow: 0 24px 72px -24px rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 28px;
  }
  .gate-head {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
  }
  .gate-head img { width: 56px; height: 56px; object-fit: contain; margin-bottom: 10px; }
  .gate-title { font-size: 22px; font-weight: 600; letter-spacing: -0.025em; }
  .gate-sub   { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
  .gate-fields { display: flex; flex-direction: column; gap: 10px; }
  .gate-fields.collapsed { display: none; }
  .gate-field-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-mute);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .gate-input {
    width: 100%;
    padding: 9px 11px;
    background: #0c0f14;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 12px;
    outline: none;
    transition: border-color 120ms;
  }
  .gate-input:focus { border-color: var(--accent); }
  .gate-config-toggle {
    background: none;
    border: none;
    color: var(--text-mute);
    font-size: 11.5px;
    cursor: pointer;
    align-self: center;
    padding: 2px 6px;
    font-family: inherit;
  }
  .gate-config-toggle:hover { color: var(--text-dim); }
  .gate-login-btn {
    width: 100%;
    padding: 14px 18px;
    background: #5865f2;
    border: 1px solid #5865f2;
    border-radius: 10px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 120ms, border-color 120ms, opacity 120ms;
  }
  .gate-login-btn:hover:not(:disabled) { background: #4752c4; border-color: #4752c4; }
  .gate-login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .gate-error {
    padding: 10px 12px;
    background: rgba(220, 80, 80, 0.08);
    border: 1px solid rgba(220, 80, 80, 0.3);
    border-radius: 6px;
    color: #f2a7a7;
    font-size: 12px;
    line-height: 1.45;
    font-family: var(--font-ui);
  }
  .gate-footnote { font-size: 11px; color: var(--text-mute); text-align: center; }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 10px 4px 4px;
    margin-right: 8px;
    background: #12161d;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    -webkit-app-region: no-drag;
    cursor: pointer;
    transition: background 120ms, border-color 120ms;
    position: relative;
  }
  .user-badge:hover { background: #181d25; border-color: var(--border); }
  .user-badge img, .user-badge .user-dot {
    width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
  }
  .user-badge .user-dot {
    background: var(--accent-dim);
    display: grid; place-items: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
  }
  .user-badge .user-name {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .user-badge .user-caret { opacity: 0.5; }
  .user-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 160px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.6);
    z-index: 100;
    display: flex;
    flex-direction: column;
  }
  .user-menu-item {
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text-dim);
    border-radius: 6px;
    cursor: pointer;
    transition: background 120ms, color 120ms;
  }
  .user-menu-item:hover { background: #1b2029; color: var(--text); }
  .user-menu-sep {
    height: 1px;
    background: var(--border-soft);
    margin: 4px 2px;
  }
  .user-menu-meta {
    padding: 10px 12px 2px;
    font-size: 11.5px;
    color: var(--text-mute);
    font-weight: 500;
  }
  .user-menu-sub {
    padding: 2px 12px 8px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--font-ui);
    word-break: break-all;
    font-weight: 500;
  }

  .field {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 18px 0;
    border-top: 1px solid var(--border-soft);
  }
  .field:first-child { border-top: none; padding-top: 4px; }
  .field:last-child { padding-bottom: 4px; }
  .field-label { font-size: 13.5px; color: var(--text); font-weight: 500; letter-spacing: -0.005em; }
  .field-sub { font-size: 12px; color: var(--text-mute); margin-top: 4px; line-height: 1.5; }
  .slider-row { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .slider {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 4px;
    background: #0c0f14;
    border-radius: 2px;
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 4px var(--bg), 0 0 10px var(--accent-glow);
  }
  .slider-value {
    font-family: var(--font-ui);
    font-size: 12px;
    color: var(--accent);
    min-width: 58px;
    text-align: right;
    font-weight: 500;
  }

  .toggle {
    width: 34px; height: 20px;
    background: #0c0f14;
    border: 1px solid var(--border);
    border-radius: 999px;
    position: relative;
    cursor: pointer;
    transition: background 160ms, border-color 160ms;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: transform 180ms cubic-bezier(.4,1.4,.6,1), background 160ms;
  }
  .toggle.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle.on::after { transform: translateX(14px); background: var(--accent); }

  .update-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    font-family: var(--font-ui);
    font-size: 11.5px;
  }
  .update-row .k { color: var(--text-mute); min-width: 76px; }
  .update-row .v { color: var(--text); word-break: break-all; }
  .update-row .v.ok { color: var(--green); }
  .update-row .v.new { color: var(--accent); }
  .update-progress {
    margin-top: 10px;
    height: 2px;
    background: #0c0f14;
    border-radius: 1px;
    overflow: hidden;
  }
  .update-progress-fill { height: 100%; background: var(--accent); transition: width 200ms; }

  .hint { font-size: 12px; color: var(--text-mute); font-family: var(--font-ui); line-height: 1.5; }
  .row { display: flex; align-items: center; gap: 8px; }
  .tag-pill {
    font-family: var(--font-ui);
    font-size: 11px;
    padding: 3px 10px;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .tag-pill.accent { color: var(--accent); border-color: oklch(0.78 0.12 210 / 0.3); background: var(--accent-dim); }
  .tag-pill.err { color: var(--red); border-color: oklch(0.70 0.18 25 / 0.3); background: oklch(0.70 0.18 25 / 0.1); }

  .err-msg {
    margin-top: 12px;
    padding: 9px 11px;
    background: oklch(0.70 0.18 25 / 0.08);
    border: 1px solid oklch(0.70 0.18 25 / 0.25);
    border-radius: 6px;
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--red);
    white-space: pre-wrap;
  }

  .status-footer {
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .status-footer-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .status-footer-hd h4 {
    margin: 0;
    font-size: 13px;
    letter-spacing: -0.005em;
    color: var(--text);
    font-weight: 600;
  }

  .path-picker {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .path-input {
    flex: 1;
    background: #0c0f14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11.5px;
    outline: none;
    cursor: default;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="node_modules/react/umd/react.development.js"></script>
<script src="node_modules/react-dom/umd/react-dom.development.js"></script>
<script src="node_modules/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const IPC = window.api;

const Icon = ({ d, size = 14, stroke = 1.6 }) => (
  <svg className="nav-icon" width={size} height={size} viewBox="0 0 24 24" fill="none"
       stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round">
    <path d={d} />
  </svg>
);
const I = {
  inject: "M14 4 20 10 M10 8l6 6 M4 20l6-6 M4 14v6h6",
  settings: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1A2 2 0 1 1 4.3 17l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1A2 2 0 1 1 7 4.3l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z",
  info: "M12 16v-4 M12 8h.01 M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z",
  play: "m5 3 14 9-14 9V3Z",
  download: "M12 3v12 m-5-5 5 5 5-5 M5 21h14",
  check: "m5 12 5 5L20 7",
  zap: "M13 2 3 14h8l-1 8 10-12h-8l1-8z",
};

const STATES = {
  IDLE: 'idle', SCANNING: 'scanning', WAITING: 'waiting',
  INJECTING: 'injecting', INJECTED: 'injected', ERROR: 'error', UPDATING: 'updating',
};

const AUTH = { LOADING: 'loading', ANON: 'anon', AUTHED: 'authed' };

// Human-friendly mapping for backend error codes surfaced during login.
const LOGIN_ERROR_COPY = {
  missing_api_url: 'Set the API URL in config before signing in.',
  missing_discord_client_id: 'Set the Discord client ID in config before signing in.',
  oauth_timeout: 'Sign-in window timed out. Try again.',
  state_mismatch: 'OAuth state mismatch. Try again.',
  missing_code: 'Discord did not return an authorization code.',
  invalid_body: 'Backend rejected the request payload.',
  invalid_discord_token: 'Discord rejected the access token.',
  banned: 'Your account is banned.',
};
const STATUS_COPY = {
  idle:      { label: 'Ready',      sub: 'Waiting for the game to launch' },
  scanning:  { label: 'Scanning',   sub: 'Looking for Rocket League' },
  waiting:   { label: 'Preparing',  sub: 'Getting ready to attach' },
  injecting: { label: 'Attaching',  sub: 'Loading the module' },
  injected:  { label: 'Connected',  sub: 'Module is running' },
  error:     { label: 'Error',      sub: 'Something went wrong' },
  updating:  { label: 'Updating',   sub: 'Fetching the latest build' },
};

function App() {
  const [state, setState] = useState(STATES.IDLE);
  const [proc, setProc] = useState(null);
  const [autoInject, setAutoInject] = useState(true);
  const [autoUpdate, setAutoUpdate] = useState(true);
  const [delay, setDelay] = useState(5000);
  const [waitRemaining, setWaitRemaining] = useState(0);
  const [injectProgress, setInjectProgress] = useState(0);
  const [updateProgress, setUpdateProgress] = useState(0);
  const [dllInfo, setDllInfo] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const [route, setRoute] = useState('injector');
  const [launcher, setLauncher] = useState('steam');

  const [authStatus, setAuthStatus] = useState(AUTH.LOADING);
  const [authUser, setAuthUser] = useState(null);
  const [authError, setAuthError] = useState('');
  const [loggingIn, setLoggingIn] = useState(false);

  const injectedPidRef = useRef(null);
  const didAutoRef = useRef(false);
  const stateRef = useRef(state);
  useEffect(() => { stateRef.current = state; }, [state]);

  const refreshDll = useCallback(async () => {
    const s = await IPC.dllStatus();
    setDllInfo(s);
    return s;
  }, []);

  useEffect(() => {
    (async () => {
      const cfg = await IPC.settings.get();
      if (cfg.launcher) setLauncher(cfg.launcher);
      refreshDll();
    })();
  }, [refreshDll]);

  // Hydrate auth state on mount and re-check after login/logout. The main
  // process is the source of truth; renderer just mirrors.
  const refreshAuth = useCallback(async () => {
    const s = await IPC.auth.status();
    if (s?.authenticated) {
      setAuthStatus(AUTH.AUTHED);
      setAuthUser(s.user || null);
    } else {
      setAuthStatus(AUTH.ANON);
      setAuthUser(null);
    }
  }, []);

  useEffect(() => { refreshAuth(); }, [refreshAuth]);

  // Auth-gated injection-related polling. We still let the user see the UI
  // while anon, but no background work should happen.
  const authed = authStatus === AUTH.AUTHED;

  // poll process every 2s (only while authenticated)
  useEffect(() => {
    if (!authed) return;
    let alive = true;
    const tick = async () => {
      const p = await IPC.findProcess();
      if (!alive) return;
      setProc(prev => {
        if (p && (!prev || prev.pid !== p.pid)) {
          if (injectedPidRef.current !== p.pid) {
            injectedPidRef.current = null;
            if (stateRef.current === STATES.INJECTED) setState(STATES.IDLE);
          }
        }
        if (!p && prev) {
          injectedPidRef.current = null;
          if (stateRef.current === STATES.INJECTED) setState(STATES.IDLE);
        }
        return p;
      });
    };
    tick();
    const id = setInterval(tick, 2000);
    return () => { alive = false; clearInterval(id); };
  }, [authed]);

  // auto-inject once after process appears (gated on auth)
  useEffect(() => {
    if (!authed) return;
    if (proc && autoInject && state === STATES.IDLE && !didAutoRef.current && injectedPidRef.current !== proc.pid) {
      didAutoRef.current = true;
      const id = setTimeout(() => beginInject(true), 400);
      return () => clearTimeout(id);
    }
    if (!proc) didAutoRef.current = false;
  }, [proc, autoInject, state, authed]);

  // countdown
  useEffect(() => {
    if (state !== STATES.WAITING) return;
    if (waitRemaining <= 0) { runInjection(); return; }
    const id = setTimeout(() => setWaitRemaining(w => Math.max(0, w - 100)), 100);
    return () => clearTimeout(id);
  }, [state, waitRemaining]);

  // inject progress animation
  useEffect(() => {
    if (state !== STATES.INJECTING) return;
    if (injectProgress >= 95) return;
    const id = setTimeout(() => setInjectProgress(p => Math.min(95, p + 4 + Math.random()*3)), 60);
    return () => clearTimeout(id);
  }, [state, injectProgress]);

  const beginInject = async (isAuto = false) => {
    if (!proc) { setErrMsg('Rocket League is not running. Launch it first.'); setState(STATES.ERROR); return; }
    setErrMsg('');
    setState(STATES.SCANNING);

    let info = await refreshDll();
    if (autoUpdate && info?.updateAvailable) {
      await runUpdate(false);
      info = await refreshDll();
    }
    if (!info?.cached && info?.source) {
      await IPC.dllUpdate();
      info = await refreshDll();
    }
    if (!info?.cached) {
      setErrMsg('DLL not available. Build or select a valid module first.');
      setState(STATES.ERROR);
      return;
    }

    if (delay > 0) {
      setWaitRemaining(delay);
      setState(STATES.WAITING);
    } else {
      runInjection();
    }
  };

  const runInjection = async () => {
    setInjectProgress(0);
    setState(STATES.INJECTING);
    const info = dllInfo?.cached ? dllInfo : await refreshDll();
    const dllPathToInject = info?.cached?.path;
    if (!proc || !dllPathToInject) { setErrMsg('Missing process or DLL.'); setState(STATES.ERROR); return; }
    const result = await IPC.inject(proc.pid, dllPathToInject);
    if (result.ok) {
      setInjectProgress(100);
      injectedPidRef.current = proc.pid;
      setTimeout(() => setState(STATES.INJECTED), 150);
    } else {
      setErrMsg(result.error || 'Injection failed');
      setState(STATES.ERROR);
    }
  };

  const runUpdate = async (updateState = true) => {
    if (updateState) setState(STATES.UPDATING);
    setUpdateProgress(0);
    let p = 0;
    const tickId = setInterval(() => { p = Math.min(90, p + 8 + Math.random()*6); setUpdateProgress(p); }, 80);
    const res = await IPC.dllUpdate();
    clearInterval(tickId);
    setUpdateProgress(100);
    await refreshDll();
    setTimeout(() => {
      setUpdateProgress(0);
      if (updateState) setState(STATES.IDLE);
    }, 400);
    return res;
  };

  const handleLauncherChange = async (val) => {
    setLauncher(val);
    await IPC.settings.set({ launcher: val });
  };

  const launchGame = async () => {
    await IPC.launchGame();
  };

  const handleLogin = async () => {
    setAuthError('');
    setLoggingIn(true);
    try {
      const res = await IPC.auth.login();
      if (res.ok) {
        await refreshAuth();
      } else {
        const msg = LOGIN_ERROR_COPY[res.error] || res.error || 'Login failed.';
        if (res.banned && res.banned.bannedReason) {
          setAuthError(`Account banned: ${res.banned.bannedReason}`);
        } else {
          setAuthError(msg);
        }
      }
    } catch (e) {
      setAuthError(String(e?.message || e));
    } finally {
      setLoggingIn(false);
    }
  };

  const handleLogout = async () => {
    await IPC.auth.logout();
    setAuthStatus(AUTH.ANON);
    setAuthUser(null);
  };

  const canInject = !!proc && (state === STATES.IDLE || state === STATES.ERROR) && !!dllInfo?.cached;
  const isBusy = [STATES.SCANNING, STATES.WAITING, STATES.INJECTING, STATES.UPDATING].includes(state);
  const isInjected = state === STATES.INJECTED;
  const status = STATUS_COPY[state];

  return (
    <div className="window">
      <Titlebar user={authUser} onLogout={handleLogout} />
      <div className="body">
        <Sidebar route={route} setRoute={setRoute} />
        <div className="main">
          <header className="page-head">
            <div>
              <h1>{route === 'injector' ? 'Injector' : route === 'settings' ? 'Settings' : 'About'}</h1>
              <p>
                {route === 'injector' && 'Launch Rocket League and attach the module in one click.'}
                {route === 'settings' && 'Control how the launcher behaves when the game appears.'}
                {route === 'about' && 'Credits and version information.'}
              </p>
            </div>
            {route === 'injector' && (
              <div className={`proc-pill ${proc ? 'running' : ''}`}>
                <span className="dot" />
                <span>{proc ? 'Rocket League is running' : 'Rocket League is not running'}</span>
              </div>
            )}
          </header>

          {route === 'injector' && (
            <div className="content">
              <StatusCard
                state={state} status={status}
                waitRemaining={waitRemaining} injectProgress={injectProgress}
                canInject={canInject} isInjected={isInjected} isBusy={isBusy}
                errMsg={errMsg}
                onInject={() => beginInject(false)}
                onLaunch={launchGame} hasProc={!!proc}
                dllInfo={dllInfo} updateProgress={updateProgress}
                onUpdate={() => runUpdate(true)} onRefresh={refreshDll}
              />
            </div>
          )}

          {route === 'settings' && (
            <div className="content">
              <div className="col">

                <div className="card">
                  <div className="card-hd">
                    <h3>Behavior</h3>
                  </div>
                  <div className="card-bd">
                    <div className="field">
                      <div>
                        <div className="field-label">Start delay</div>
                        <div className="field-sub">How long to wait after the game appears before attaching.</div>
                      </div>
                      <div className="slider-value">{(delay/1000).toFixed(1)}s</div>
                      <div className="slider-row">
                        <input
                          className="slider"
                          type="range" min="0" max="10000" step="100"
                          value={delay}
                          onChange={e => setDelay(Number(e.target.value))}
                          style={{
                            background: `linear-gradient(to right, var(--accent) 0%, var(--accent) ${(delay/10000)*100}%, #0c0f14 ${(delay/10000)*100}%, #0c0f14 100%)`
                          }}
                        />
                      </div>
                    </div>
                    <div className="field">
                      <div>
                        <div className="field-label">Attach automatically</div>
                        <div className="field-sub">Start attaching as soon as Rocket League appears.</div>
                      </div>
                      <div className={`toggle ${autoInject ? 'on' : ''}`} onClick={() => setAutoInject(a => !a)} />
                    </div>
                    <div className="field">
                      <div>
                        <div className="field-label">Keep the module updated</div>
                        <div className="field-sub">Pull the latest build from the source folder before each attach.</div>
                      </div>
                      <div className={`toggle ${autoUpdate ? 'on' : ''}`} onClick={() => setAutoUpdate(a => !a)} />
                    </div>
                  </div>
                </div>

                <div className="card">
                  <div className="card-hd">
                    <h3>Environment</h3>
                  </div>
                  <div className="card-bd">
                    <div className="field">
                      <div>
                        <div className="field-label">Launch platform</div>
                        <div className="field-sub">Choose which launcher the "Launch Rocket League" button opens.</div>
                      </div>
                      <div className="row" style={{gap: 6}}>
                        <button
                          className={`btn-secondary ${launcher === 'steam' ? 'active' : ''}`}
                          onClick={() => handleLauncherChange('steam')}
                          style={launcher === 'steam' ? {borderColor: 'var(--accent)', background: 'var(--accent-dim)', color: 'var(--accent)'} : {}}
                        >
                          Steam
                        </button>
                        <button
                          className={`btn-secondary ${launcher === 'epic' ? 'active' : ''}`}
                          onClick={() => handleLauncherChange('epic')}
                          style={launcher === 'epic' ? {borderColor: 'var(--accent)', background: 'var(--accent-dim)', color: 'var(--accent)'} : {}}
                        >
                          Epic Games
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {route === 'about' && (
            <div className="content">
              <div className="about-card">
                <img src="logo.png" alt="" className="about-logo" />
                <div className="about-title">Anti Bot Injector</div>
                <div className="about-version">v1.0</div>
                <div className="about-credits">
                  Designed by{' '}
                  <a href="#" onClick={(e) => { e.preventDefault(); IPC.openExternal('https://github.com/CustomRL'); }}>Custom</a>
                  {' '}and{' '}
                  <a href="#" onClick={(e) => { e.preventDefault(); IPC.openExternal('https://github.com/b9llach'); }}>Billy</a>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
      {authStatus !== AUTH.AUTHED && (
        <AuthGate
          loading={authStatus === AUTH.LOADING}
          loggingIn={loggingIn}
          error={authError}
          onLogin={handleLogin}
        />
      )}
    </div>
  );
}

function Titlebar({ user, onLogout }) {
  return (
    <div className="titlebar">
      <div className="titlebar-brand">
        <img className="titlebar-brand-mark" src="logo.png" alt="" />
        <strong>Anti Bot Injector</strong>
      </div>
      <div className="titlebar-spacer" />
      {user && <UserBadge user={user} onLogout={onLogout} />}
      <div className="win-controls">
        <div className="win-btn" title="Minimize" onClick={() => IPC.win.minimize()}>
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 5h8" stroke="currentColor" strokeWidth="1.2" /></svg>
        </div>
        <div className="win-btn" title="Maximize" onClick={() => IPC.win.maximize()}>
          <svg width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor" strokeWidth="1.2" /></svg>
        </div>
        <div className="win-btn close" title="Close" onClick={() => IPC.win.close()}>
          <svg width="10" height="10" viewBox="0 0 10 10"><path d="m1 1 8 8 M9 1l-8 8" stroke="currentColor" strokeWidth="1.2" /></svg>
        </div>
      </div>
    </div>
  );
}

function Sidebar({ route, setRoute }) {
  const item = (key, icon, label) => (
    <div className={`nav ${route === key ? 'active' : ''}`} onClick={() => setRoute(key)}>
      <Icon d={icon} /> {label} <span className="nav-dot" />
    </div>
  );
  return (
    <aside className="sidebar">
      <div className="side-label">Workspace</div>
      {item('injector', I.inject, 'Injector')}
      {item('settings', I.settings, 'Settings')}
      {item('about', I.info, 'About')}
    </aside>
  );
}

function StatusCard({ state, status, waitRemaining, injectProgress, canInject, isInjected, isBusy, errMsg, onInject, onLaunch, hasProc, dllInfo, updateProgress, onUpdate, onRefresh }) {
  const cls = `status-card status-${state}`;
  let displaySub = status.sub;
  if (state === STATES.WAITING) displaySub = `Starting in ${(waitRemaining/1000).toFixed(1)} seconds`;
  if (state === STATES.INJECTING) displaySub = `Loading the module, ${injectProgress.toFixed(0)}%`;
  if (state === STATES.INJECTED) displaySub = 'Module is running in Rocket League';

  const isUpdating = state === STATES.UPDATING;
  const src = dllInfo?.source;
  const available = !!dllInfo?.updateAvailable;

  let btn;
  if (isInjected) {
    btn = (
      <button className="inject-btn ghost" disabled>
        <Icon d={I.check} size={13} /> Running. Restart the game to detach.
      </button>
    );
  } else if (!hasProc) {
    btn = (
      <button className="inject-btn" onClick={onLaunch}>
        <Icon d={I.play} size={13} /> Launch Rocket League
      </button>
    );
  } else {
    btn = (
      <button className="inject-btn" disabled={!canInject || isBusy} onClick={onInject}>
        <Icon d={I.zap} size={14} />
        {isBusy ? status.label + '...' : 'Attach to Rocket League'}
      </button>
    );
  }

  return (
    <div className={cls}>
      <div className="status-top">
        <div className="status-label">Injection Status</div>
        <span className="status-badge"><span className="status-dot" /> {status.label}</span>
      </div>
      <div className="status-value">
        <div className="status-indicator">
          <div className="ring" />
          <div className="ring-active" />
          <div className="core" />
        </div>
        <div className="status-text">
          <h2>{status.label}</h2>
          <p>{displaySub}</p>
        </div>
      </div>
      <div className="status-bar">
        <div className="status-bar-sweep" />
        <div className="status-bar-fill" style={{
          transform: `scaleX(${
            state === STATES.INJECTING ? injectProgress/100 :
            state === STATES.INJECTED ? 1 : 0
          })`
        }} />
      </div>
      {btn}
      {state === STATES.ERROR && errMsg && <div className="err-msg">{errMsg}</div>}

      <div className="status-footer">
        <div className="status-footer-hd">
          <h4>Module updates</h4>
          {!src && <span className="tag-pill err">No source file</span>}
          {src && available && !isUpdating && <span className="tag-pill accent">Update ready</span>}
          {src && !available && !isUpdating && <span className="tag-pill">Up to date</span>}
        </div>

        {isUpdating && (
          <div>
            <div className="update-progress">
              <div className="update-progress-fill" style={{width: `${updateProgress}%`}} />
            </div>
            <div className="hint" style={{marginTop:6}}>Copying the latest build, {updateProgress.toFixed(0)}%</div>
          </div>
        )}

        <div style={{display: 'flex', gap: 10, marginTop: 4}}>
          <button
            className="btn-secondary"
            style={{flex: 1}}
            disabled={!src || isUpdating || !available}
            onClick={onUpdate}
          >
            <Icon d={available ? I.download : I.check} size={13} />
            {isUpdating ? 'Updating...' : available ? 'Update module' : 'Up to date'}
          </button>
          <button
            className="btn-secondary"
            onClick={onRefresh}
            disabled={isUpdating}
            title="Force refresh status"
          >
            <Icon d={I.info} size={13} />
          </button>
        </div>
      </div>
    </div>
  );
}

function AuthGate({ loading, loggingIn, error, onLogin }) {
  return (
    <div className="gate-backdrop">
      <div className="gate-card">
        <div className="gate-head">
          <img src="logo.png" alt="" />
          <div className="gate-title">Welcome back</div>
          <div className="gate-sub">Sign in with Discord to use the injector.</div>
        </div>

        <button
          className="gate-login-btn"
          type="button"
          onClick={onLogin}
          disabled={loading || loggingIn}
        >
          {loggingIn
            ? 'Waiting for Discord...'
            : loading
              ? 'Loading...'
              : 'Sign in with Discord'}
        </button>

        {error && <div className="gate-error">{error}</div>}
      </div>
    </div>
  );
}

function UserBadge({ user, onLogout }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const onDocClick = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, [open]);

  const initial = (user.username || user.globalName || '?').slice(0, 1);
  return (
    <div className="user-badge" ref={ref} onClick={() => setOpen(o => !o)}>
      {user.avatar
        ? <img src={user.avatar} alt="" referrerPolicy="no-referrer" />
        : <span className="user-dot">{initial}</span>}
      <span className="user-name">{user.globalName || user.username}</span>
      <svg className="user-caret" width="10" height="10" viewBox="0 0 10 10">
        <path d="M2 3.5 5 6.5 8 3.5" stroke="currentColor" strokeWidth="1.3" fill="none" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
      {open && (
        <div className="user-menu" onClick={e => e.stopPropagation()}>
          <div className="user-menu-meta">Signed in as</div>
          <div className="user-menu-sub">{user.username}{user.role === 'admin' ? ' (admin)' : ''}</div>
          <div className="user-menu-sep" />
          <div className="user-menu-item" onClick={() => { setOpen(false); onLogout(); }}>
            Sign out
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
